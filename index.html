<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microbot Launcher</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="loader-container">
    <h1>Progreso de Descarga y Desempaquetado</h1>
    <div id="loader">
        <div id="progress-bar">0%</div>
    </div>
    <div id="status"></div>
</div>


<div id="main-container" class="container">
    <!-- Navbar -->
    <nav class="navbar">
    </nav>

    <!-- Contenido Principal -->
    <div class="main-content">
        <div class="content">
            <div class="featured">
                <div id="update-available">
                    <h2>¡Nueva Actualización Disponible!</h2>
                    <p>Una nueva versión de <strong>Microbot</strong> está disponible. Incluye nuevas funciones y mejoras emocionantes.</p>
                    <div class="modal-actions">
                        <button id="update-now-btn" class="loadingButton">Actualizar Ahora</button>
                        <button id="remind-me-later-btn" class="loadingButton">Recordármelo más tarde</button>
                    </div>
                    <hr />
                </div>
            </div>
            <div class="recent-updates">
                <iframe id="website" style="width:100%;height:85vh" loading="lazy">
                </iframe>
            </div>
        </div>
        <!-- Barra Lateral -->
        <aside class="sidebar">
            <div class="game-logo">
                <img alt="Logo de Microbot" src="https://files.microbot.cloud/assets/microbot-launcher/images/microbot_transparent.png" />
            </div>
            <button id="play-no-jagex-account" class="play-button loadingButton">Jugar Cuenta Normal</button>
            <button id="play" class="play-button loadingButton">Iniciar Sesión con Cuenta Jagex</button>
            <button id="add-accounts" class="add-accounts loadingButton">Agregar cuentas</button>
            <button id="logout" class="logout-button loadingButton">Eliminar Todas las Cuentas</button>
            <div class="game-info">
                <label for="client">Versión</label>
                <select id="client">
                </select>
                <label for="character">Cuentas Jagex</label>
                <select id="character">
                </select>
            </div>
            <div class="proxy-section">
                <label for="proxy-ip">Configuración de Proxy (usuario y contraseña solo funcionan para SOCKS)</label>
                <input id="proxy-ip" type="text" placeholder="ip:puerto:usuario:contraseña" />
                <select id="proxy-type">
                    <option value="http">HTTP</option>
                    <option value="socks">SOCKS</option>
                </select>
            </div>
        </aside>
    </div>
</div>
<script src="https://files.microbot.cloud/assets/microbot-launcher/renderer.js?version=2.0.0"></script>
</body>
</html>
